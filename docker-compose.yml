version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ghostwork
      POSTGRES_PASSWORD: ghostwork
      POSTGRES_DB: ghostwork
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ghostwork']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ghostwork:ghostwork@postgres:5432/ghostwork
      GHOSTWORK_MODE: local_trusted
      GHOSTWORK_MIGRATION_AUTO_APPLY: 'true'
      GHOSTWORK_HOST: '0.0.0.0'
      GHOSTWORK_PORT: '3100'
    ports:
      - '3100:3100'

volumes:
  pgdata:
